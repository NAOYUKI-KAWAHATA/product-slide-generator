<!--
  TEMPLATE: 07_phase_card (フェーズカード / カリキュラム)
  USAGE: P7, P8 — フェーズ1, フェーズ2・3
  VARIABLES: {{BANNER_TITLE}}, {{PHASES}} (配列: {label, period, description})
  THEME VARIABLES: {{BG_COLOR}}, {{BANNER_BG}}, {{TEXT_COLOR}}, {{PHASE_LABEL_BG}}, {{PHASE_LABEL_COLOR}}, {{PERIOD_COLOR}}, {{RULE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
  
  NOTE: 1フェーズの場合は全幅、2フェーズの場合は上下2段
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_COLOR}};
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- 見出しバナー -->
  <div style="
    display: inline-block;
    background: {{BANNER_BG}};
    padding: 10px 40px 10px 24px;
    margin: 0;
  ">
    <span style="
      font-size: 36px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.15em;
    ">{{BANNER_TITLE}}</span>
  </div>

  <!-- バナー下の水平線 -->
  <div style="
    width: 100%;
    height: 1px;
    background: {{RULE_COLOR}};
    margin-top: 8px;
  "></div>

  <!-- フェーズカードエリア -->
  <div style="
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 80px;
    min-height: 560px;
    gap: 40px;
  ">
    <!-- REPEAT_START (1〜2フェーズ) -->
    <div style="
      display: flex;
      align-items: flex-start;
      gap: 32px;
    ">
      <!-- フェーズラベル -->
      <div style="
        background: {{PHASE_LABEL_BG}};
        padding: 8px 24px;
        flex-shrink: 0;
      ">
        <span style="
          font-size: 22px;
          font-weight: 700;
          color: {{PHASE_LABEL_COLOR}};
          letter-spacing: 0.06em;
        ">{{PHASE_LABEL}}</span>
      </div>

      <!-- フェーズ内容 -->
      <div>
        <p style="
          font-size: 18px;
          font-weight: 500;
          color: {{PERIOD_COLOR}};
          margin: 0 0 12px 0;
        ">{{PHASE_PERIOD}}</p>
        <p style="
          font-size: 32px;
          font-weight: 700;
          color: {{TEXT_COLOR}};
          margin: 0;
          line-height: 1.6;
        ">{{PHASE_DESCRIPTION}}</p>
      </div>
    </div>
    <!-- REPEAT_END -->
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
