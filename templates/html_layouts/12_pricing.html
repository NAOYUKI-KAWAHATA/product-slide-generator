<!--
  TEMPLATE: 12_pricing (料金詳細)
  USAGE: P56〜P61 — プラン詳細（対象・期間・提供内容・価格）
  VARIABLES: {{PLAN_NAME}}, {{PLAN_LABEL}}, {{PRICE}}, {{TARGET}}, {{PERIOD}}, {{SERVICES}} (配列)
  THEME VARIABLES: {{BG_GRADIENT}}, {{PLAN_NAME_COLOR}}, {{PLAN_LABEL_COLOR}}, {{PRICE_COLOR}}, {{PRICE_BG}}, {{LABEL_COLOR}}, {{VALUE_COLOR}}, {{DIVIDER_COLOR}}, {{RULE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_GRADIENT}};
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- メインコンテンツ: 左プラン名 + 右詳細 -->
  <div style="
    display: flex;
    min-height: 720px;
  ">
    <!-- 左カラム: プラン名＋価格 -->
    <div style="
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      flex-shrink: 0;
    ">
      <p style="
        font-size: 32px;
        font-weight: 700;
        color: {{PLAN_NAME_COLOR}};
        margin: 0 0 8px 0;
        letter-spacing: 0.06em;
      ">{{PLAN_NAME}}</p>
      <p style="
        font-size: 24px;
        font-weight: 500;
        color: {{PLAN_LABEL_COLOR}};
        margin: 0 0 32px 0;
        letter-spacing: 0.04em;
      ">{{PLAN_LABEL}}</p>
      <div style="
        background: {{PRICE_BG}};
        padding: 8px 24px;
      ">
        <span style="
          font-size: 22px;
          font-weight: 700;
          color: {{PRICE_COLOR}};
        ">{{PRICE}}</span>
      </div>
    </div>

    <!-- 中央の区切り線 -->
    <div style="
      width: 2px;
      background: {{DIVIDER_COLOR}};
    "></div>

    <!-- 右カラム: 詳細情報 -->
    <div style="
      flex: 1;
      padding: 48px 60px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    ">
      <!-- 対象 -->
      <div style="margin-top: 16px;">
        <span style="font-size: 26px; font-weight: 800; color: {{LABEL_COLOR}};">対象：</span>
        <span style="font-size: 26px; font-weight: 500; color: {{VALUE_COLOR}}; line-height: 1.6;">{{TARGET}}</span>
      </div>
      <div style="width: 100%; height: 1px; background: {{RULE_COLOR}}; margin: 20px 0;"></div>

      <!-- 期間 -->
      <div>
        <span style="font-size: 26px; font-weight: 800; color: {{LABEL_COLOR}};">期間：</span>
        <span style="font-size: 26px; font-weight: 500; color: {{VALUE_COLOR}};">{{PERIOD}}</span>
      </div>
      <div style="width: 100%; height: 1px; background: {{RULE_COLOR}}; margin: 20px 0;"></div>

      <!-- 提供内容 -->
      <div>
        <p style="font-size: 26px; font-weight: 800; color: {{LABEL_COLOR}}; margin: 0 0 16px 0;">提供内容</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <!-- REPEAT_START -->
          <p style="
            font-size: 24px;
            font-weight: 500;
            color: {{VALUE_COLOR}};
            margin: 0;
            line-height: 1.5;
          ">{{SERVICE}}</p>
          <!-- REPEAT_END -->
        </div>
      </div>
    </div>
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
