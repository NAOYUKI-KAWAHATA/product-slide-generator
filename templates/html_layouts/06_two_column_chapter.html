<!--
  TEMPLATE: 06_two_column_chapter (章立て2カラム)
  USAGE: P6 — 講座概要の章立てリスト
  VARIABLES: {{BANNER_TITLE}}, {{LEFT_LABEL}}, {{CHAPTERS}} (配列: 章タイトル)
  THEME VARIABLES: {{BG_COLOR}}, {{BANNER_BG}}, {{LEFT_BG}}, {{LEFT_TEXT_COLOR}}, {{RIGHT_BG}}, {{RIGHT_TEXT_COLOR}}, {{DIVIDER_COLOR}}, {{CHAPTER_NUM_COLOR}}, {{RULE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_COLOR}};
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- 見出しバナー -->
  <div style="
    display: inline-block;
    background: {{BANNER_BG}};
    padding: 10px 40px 10px 24px;
    margin: 0;
  ">
    <span style="
      font-size: 36px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.15em;
    ">{{BANNER_TITLE}}</span>
  </div>

  <!-- バナー下の水平線 -->
  <div style="
    width: 100%;
    height: 1px;
    background: {{RULE_COLOR}};
    margin-top: 8px;
  "></div>

  <!-- 2カラムエリア -->
  <div style="
    display: flex;
    min-height: 600px;
    margin-top: 8px;
  ">
    <!-- 左カラム: ブランド名 -->
    <div style="
      width: 35%;
      background: {{LEFT_BG}};
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    ">
      <p style="
        font-size: 36px;
        font-weight: 700;
        color: {{LEFT_TEXT_COLOR}};
        letter-spacing: 0.08em;
        text-align: center;
        line-height: 1.4;
      ">{{LEFT_LABEL}}</p>
    </div>

    <!-- 中央の区切り線 -->
    <div style="
      width: 2px;
      background: {{DIVIDER_COLOR}};
    "></div>

    <!-- 右カラム: 章立てリスト -->
    <div style="
      flex: 1;
      background: {{RIGHT_BG}};
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 60px;
      gap: 24px;
    ">
      <!-- REPEAT_START -->
      <div style="display: flex; align-items: baseline; gap: 16px;">
        <span style="
          font-size: 20px;
          font-weight: 700;
          color: {{CHAPTER_NUM_COLOR}};
          flex-shrink: 0;
        ">{{CHAPTER_NUM}}</span>
        <span style="
          font-size: 28px;
          font-weight: 700;
          color: {{RIGHT_TEXT_COLOR}};
          line-height: 1.4;
        ">{{CHAPTER_TITLE}}</span>
      </div>
      <!-- REPEAT_END -->
    </div>
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
