<!--
  TEMPLATE: 13_closing (エンディングCTA)
  USAGE: P62〜P66 — 最後のメッセージ・行動喚起
  VARIABLES: {{MESSAGE_LINE1}}, {{MESSAGE_LINE2}}, {{BRAND_NAME}}
  THEME VARIABLES: {{BG_GRADIENT_DARK}}, {{TEXT_COLOR}}, {{BRAND_COLOR}}, {{LINE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_GRADIENT_DARK}};
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Serif JP', serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- 中央コンテンツ -->
  <div style="text-align: center; z-index: 1; padding: 0 100px;">
    <p style="
      font-size: 44px;
      font-weight: 700;
      color: {{TEXT_COLOR}};
      margin: 0 0 24px 0;
      letter-spacing: 0.04em;
      line-height: 1.5;
    ">{{MESSAGE_LINE1}}</p>

    <p style="
      font-size: 44px;
      font-weight: 700;
      color: {{TEXT_COLOR}};
      margin: 0 0 40px 0;
      letter-spacing: 0.04em;
      line-height: 1.5;
    ">{{MESSAGE_LINE2}}</p>

    <!-- 水平線 -->
    <div style="
      width: 160px;
      height: 1.5px;
      background: {{LINE_COLOR}};
      margin: 0 auto 28px auto;
    "></div>

    <p style="
      font-size: 28px;
      font-weight: 400;
      color: {{BRAND_COLOR}};
      margin: 0;
      letter-spacing: 0.1em;
    ">{{BRAND_NAME}}</p>
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
