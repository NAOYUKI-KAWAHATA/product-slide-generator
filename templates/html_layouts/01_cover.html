<!--
  TEMPLATE: 01_cover (表紙)
  USAGE: P1 — 商品名 + サブタイトル
  VARIABLES: {{TITLE}}, {{SUBTITLE}}
  THEME VARIABLES: {{BG_GRADIENT}}, {{TITLE_COLOR}}, {{SUBTITLE_COLOR}}, {{LINE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_GRADIENT}};
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Serif JP', serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- 中央コンテンツ -->
  <div style="text-align: center; z-index: 1;">
    <h1 style="
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: {{TITLE_COLOR}};
      margin: 0;
      line-height: 1.3;
    ">{{TITLE}}</h1>

    <!-- タイトル下の水平線 -->
    <div style="
      width: 200px;
      height: 1.5px;
      background: {{LINE_COLOR}};
      margin: 24px auto;
    "></div>

    <p style="
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: {{SUBTITLE_COLOR}};
      margin: 0;
      line-height: 1.6;
    ">{{SUBTITLE}}</p>
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
