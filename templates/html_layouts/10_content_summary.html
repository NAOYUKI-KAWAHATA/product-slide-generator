<!--
  TEMPLATE: 10_content_summary (まとめ / 一覧)
  USAGE: P20 — 提供コンテンツまとめ
  VARIABLES: {{BANNER_TITLE}}, {{ITEMS}} (配列: 番号付きコンテンツ名)
  THEME VARIABLES: {{BG_COLOR}}, {{BANNER_BG}}, {{TEXT_COLOR}}, {{NUM_COLOR}}, {{RULE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_COLOR}};
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- 見出しバナー -->
  <div style="
    display: inline-block;
    background: {{BANNER_BG}};
    padding: 10px 40px 10px 24px;
    margin: 0;
  ">
    <span style="
      font-size: 36px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.15em;
    ">{{BANNER_TITLE}}</span>
  </div>

  <!-- バナー下の水平線 -->
  <div style="
    width: 100%;
    height: 1px;
    background: {{RULE_COLOR}};
    margin-top: 8px;
  "></div>

  <!-- まとめリストエリア（2カラム） -->
  <div style="
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 60px;
    padding: 40px 80px;
    min-height: 540px;
    align-content: center;
  ">
    <!-- REPEAT_START -->
    <div style="display: flex; align-items: baseline; gap: 12px;">
      <span style="
        font-size: 20px;
        font-weight: 800;
        color: {{NUM_COLOR}};
        flex-shrink: 0;
        min-width: 28px;
      ">{{ITEM_NUM}}</span>
      <span style="
        font-size: 24px;
        font-weight: 700;
        color: {{TEXT_COLOR}};
        line-height: 1.5;
      ">{{ITEM_NAME}}</span>
    </div>
    <!-- REPEAT_END -->
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
