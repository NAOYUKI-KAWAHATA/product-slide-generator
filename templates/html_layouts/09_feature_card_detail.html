<!--
  TEMPLATE: 09_feature_card_detail (提供コンテンツ詳細)
  USAGE: P10 — メイン提供コンテンツ（画像付き）
  VARIABLES: {{CONTENT_TITLE}}, {{CONTENT_SUBTITLE}}, {{FEATURES}} (配列: {label, image_placeholder})
  THEME VARIABLES: {{BG_GRADIENT_DARK}}, {{TITLE_COLOR}}, {{SUBTITLE_COLOR}}, {{FEATURE_LABEL_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_GRADIENT_DARK}};
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- タイトルエリア -->
  <div style="
    text-align: center;
    padding: 48px 80px 0 80px;
  ">
    <h3 style="
      font-size: 48px;
      font-weight: 800;
      color: {{TITLE_COLOR}};
      margin: 0 0 16px 0;
      letter-spacing: 0.04em;
    ">{{CONTENT_TITLE}}</h3>
    <p style="
      font-size: 24px;
      font-weight: 400;
      color: {{SUBTITLE_COLOR}};
      margin: 0;
      line-height: 1.6;
    ">{{CONTENT_SUBTITLE}}</p>
  </div>

  <!-- 3カラム特徴エリア -->
  <div style="
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 40px 80px 48px 80px;
  ">
    <!-- REPEAT_START (3カラム) -->
    <div style="
      flex: 1;
      text-align: center;
    ">
      <!-- 画像プレースホルダー -->
      <div style="
        width: 100%;
        height: 240px;
        background: rgba(200,200,200,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
      ">
        <span style="font-size: 14px; color: rgba(255,255,255,0.4);">{{IMAGE_PLACEHOLDER}}</span>
      </div>
      <p style="
        font-size: 22px;
        font-weight: 700;
        color: {{FEATURE_LABEL_COLOR}};
        margin: 0;
        line-height: 1.4;
      ">{{FEATURE_LABEL}}</p>
    </div>
    <!-- REPEAT_END -->
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
