<!--
  TEMPLATE: 05_section_title (セクション扉)
  USAGE: P5, P9, P21, P29, P40, P46, P54, P56 — セクション区切り
  VARIABLES: {{SECTION_TITLE}}, {{BRAND_NAME}}
  THEME VARIABLES: {{BG_GRADIENT_DARK}}, {{TITLE_COLOR}}, {{BRAND_COLOR}}, {{LINE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_GRADIENT_DARK}};
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Serif JP', serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- 中央コンテンツ -->
  <div style="text-align: center; z-index: 1;">
    <h2 style="
      font-size: 72px;
      font-weight: 700;
      color: {{TITLE_COLOR}};
      margin: 0;
      letter-spacing: 0.12em;
      line-height: 1.3;
    ">{{SECTION_TITLE}}</h2>

    <!-- 水平線 -->
    <div style="
      width: 160px;
      height: 1.5px;
      background: {{LINE_COLOR}};
      margin: 28px auto;
    "></div>

    <p style="
      font-size: 28px;
      font-weight: 400;
      color: {{BRAND_COLOR}};
      margin: 0;
      letter-spacing: 0.1em;
    ">{{BRAND_NAME}}</p>
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
