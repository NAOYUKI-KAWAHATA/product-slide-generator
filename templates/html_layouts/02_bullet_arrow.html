<!--
  TEMPLATE: 02_bullet_arrow (矢印付き箇条書き / コンセプト)
  USAGE: P2 — コンセプト文（3行）
  VARIABLES: {{BANNER_TITLE}}, {{LINE1}}, {{LINE2}}, {{LINE3}}
  THEME VARIABLES: {{BG_COLOR}}, {{BANNER_BG}}, {{TEXT_COLOR}}, {{ARROW_COLOR}}, {{RULE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_COLOR}};
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- 見出しバナー -->
  <div style="
    display: inline-block;
    background: {{BANNER_BG}};
    padding: 10px 40px 10px 24px;
    margin: 0;
  ">
    <span style="
      font-size: 36px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.15em;
    ">{{BANNER_TITLE}}</span>
  </div>

  <!-- バナー下の水平線 -->
  <div style="
    width: 100%;
    height: 1px;
    background: {{RULE_COLOR}};
    margin-top: 8px;
  "></div>

  <!-- 箇条書きエリア -->
  <div style="
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 100px 40px 80px;
    min-height: 520px;
  ">
    <!-- 行1 -->
    <div style="display: flex; align-items: center; margin-top: 20px;">
      <div style="
        width: 80px;
        height: 2px;
        background: {{ARROW_COLOR}};
        flex-shrink: 0;
      "></div>
      <div style="
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 12px solid {{ARROW_COLOR}};
        flex-shrink: 0;
        margin-right: 24px;
      "></div>
      <span style="
        font-size: 38px;
        font-weight: 800;
        color: {{TEXT_COLOR}};
        letter-spacing: 0.04em;
        line-height: 1.4;
      ">{{LINE1}}</span>
    </div>

    <!-- 行2 -->
    <div style="display: flex; align-items: center; margin-top: 60px;">
      <div style="
        width: 120px;
        height: 2px;
        background: {{ARROW_COLOR}};
        flex-shrink: 0;
      "></div>
      <div style="
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 12px solid {{ARROW_COLOR}};
        flex-shrink: 0;
        margin-right: 24px;
      "></div>
      <span style="
        font-size: 38px;
        font-weight: 800;
        color: {{TEXT_COLOR}};
        letter-spacing: 0.04em;
        line-height: 1.4;
      ">{{LINE2}}</span>
    </div>

    <!-- 行3 -->
    <div style="display: flex; align-items: flex-start; margin-top: 60px;">
      <div style="
        width: 160px;
        height: 2px;
        background: {{ARROW_COLOR}};
        flex-shrink: 0;
        margin-top: 22px;
      "></div>
      <div style="
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 12px solid {{ARROW_COLOR}};
        flex-shrink: 0;
        margin-right: 24px;
        margin-top: 16px;
      "></div>
      <span style="
        font-size: 38px;
        font-weight: 800;
        color: {{TEXT_COLOR}};
        letter-spacing: 0.04em;
        line-height: 1.5;
      ">{{LINE3}}</span>
    </div>
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
