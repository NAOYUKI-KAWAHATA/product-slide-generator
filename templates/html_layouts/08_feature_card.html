<!--
  TEMPLATE: 08_feature_card (提供コンテンツ簡易カード)
  USAGE: P11〜P19 — 提供コンテンツ②〜⑩
  VARIABLES: {{BANNER_TITLE}}, {{CONTENT_TITLE}}, {{CONTENT_DESCRIPTION}}
  THEME VARIABLES: {{BG_COLOR}}, {{BANNER_BG}}, {{TITLE_COLOR}}, {{DESC_COLOR}}, {{RULE_COLOR}}, {{DECO_LEFT}}, {{DECO_RIGHT_BOTTOM}}
  
  NOTE: シンプルな構成。タイトル大きく＋説明文
-->
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: {{BG_COLOR}};
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
">
  <!-- 左端の装飾ライン -->
  {{DECO_LEFT}}

  <!-- 見出しバナー -->
  <div style="
    display: inline-block;
    background: {{BANNER_BG}};
    padding: 10px 40px 10px 24px;
    margin: 0;
  ">
    <span style="
      font-size: 36px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.15em;
    ">{{BANNER_TITLE}}</span>
  </div>

  <!-- バナー下の水平線 -->
  <div style="
    width: 100%;
    height: 1px;
    background: {{RULE_COLOR}};
    margin-top: 8px;
  "></div>

  <!-- コンテンツエリア -->
  <div style="
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 100px;
    min-height: 540px;
    text-align: center;
  ">
    <!-- コンテンツタイトル -->
    <h3 style="
      font-size: 48px;
      font-weight: 800;
      color: {{TITLE_COLOR}};
      margin: 0 0 40px 0;
      letter-spacing: 0.04em;
      line-height: 1.3;
    ">{{CONTENT_TITLE}}</h3>

    <!-- 説明文 -->
    <p style="
      font-size: 28px;
      font-weight: 500;
      color: {{DESC_COLOR}};
      margin: 0;
      line-height: 1.8;
      text-align: center;
      max-width: 1000px;
    ">{{CONTENT_DESCRIPTION}}</p>
  </div>

  <!-- 右下の装飾ライン -->
  {{DECO_RIGHT_BOTTOM}}
</div>
