<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #FCFEFE 0%, #E7F6F6 100%);position:relative;overflow:hidden;">
  <!-- 左上の斜め線装飾（1本） -->
<div style="position:absolute;top:-50px;left:-50px;width:300px;height:300px;z-index:0;pointer-events:none;opacity:0.7;overflow:hidden;">
  <div style="position:absolute;top:150px;left:-100px;width:400px;height:2px;background:linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);transform:rotate(-45deg);"></div>
</div>
  <!-- 右下の斜め線装飾（2本） -->
<div style="position:absolute;bottom:-50px;right:-50px;width:300px;height:300px;z-index:0;pointer-events:none;opacity:0.7;overflow:hidden;">
  <div style="position:absolute;bottom:150px;right:-100px;width:400px;height:2px;background:linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);transform:rotate(-45deg);"></div>
  <div style="position:absolute;bottom:200px;right:-50px;width:400px;height:1px;background:linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);transform:rotate(-45deg);opacity:0.7;"></div>
</div>
</div>
  <!-- 左上バナー -->
  <div style="position:relative;z-index:1;margin-top:44px;margin-left:60px;display:inline-block;">
    <div style="background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);padding:12px 36px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">カリキュラム詳細①</span>
    </div>
  </div>

  <!-- シャンパンゴールド横線（テーマ2ではアクアブルー系） -->
  <div style="position:relative;z-index:1;margin:0 60px;height:1.5px;background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F));margin-top:14px;"></div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;display:flex;flex-direction:column;justify-content:center;gap:16px;margin-top:16px;margin-bottom:64px;">

    <!-- フェーズ1 -->
    <div style="display:flex;flex-direction:column;gap:10px;background:rgba(240,248,255,0.6);padding:14px 28px;border:1px solid rgba(135,206,250,0.3);">
      <div style="display:flex;align-items:center;gap:20px;">
        <div style="background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);padding:10px 22px;flex-shrink:0;">
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">フェーズ1</span>
        </div>
        <h3 style="font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;color:#4682B4;">第1章〜第2章「体を知り・食の原則を学ぶ基礎フェーズ」</h3>
      </div>
      <p style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.5;margin-top:4px;">女性ホルモンの仕組みと体質タイプを理解し、薬に頼らず食で治す美食メソッドの基本を習得します。まずは「なぜ不調が起きているのか」を知ることが変化の第一歩です。</p>
    </div>

    <!-- フェーズ2 -->
    <div style="display:flex;flex-direction:column;gap:10px;background:rgba(240,248,255,0.6);padding:14px 28px;border:1px solid rgba(135,206,250,0.3);">
      <div style="display:flex;align-items:center;gap:20px;">
        <div style="background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);padding:10px 22px;flex-shrink:0;">
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">フェーズ2</span>
        </div>
        <h3 style="font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;color:#4682B4;">第3章〜第4章「症状別に食事で改善する実践フェーズ」</h3>
      </div>
      <p style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.5;margin-top:4px;">生理痛・冷え性・更年期それぞれの症状に合わせた食事設計を実践。モデル食プランや美食ルーティンを身につけ、毎月の体調変化を実感できるようになります。</p>
    </div>

  </div>

</body>
</html>
