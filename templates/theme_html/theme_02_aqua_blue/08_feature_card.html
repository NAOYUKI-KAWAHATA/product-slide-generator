<!--
  TEMPLATE: 08_feature_card (提供コンテンツ簡易カード)
  USAGE: P11〜P19 — 提供コンテンツ②〜⑩
  VARIABLES: サンプル見出し, 提供コンテンツ, 提供コンテンツの詳細な説明文がここに入ります。
  THEME VARIABLES: linear-gradient(135deg, #E0F7FA 0%, #E0F2F1 100%), linear-gradient(90deg, #4DD0E1 0%, #80DEEA 100%), #37474F, #455A64, #4DD0E1, <div style="position: absolute; top: 0; left: 0; width: 12px; height: 100%; background: linear-gradient(180deg, #4DD0E1 0%, #80DEEA 100%);"></div>, <div style="position: absolute; bottom: 30px; right: 30px; width: 100px; height: 100px; border-right: 2px solid rgba(77,208,225,0.3); border-bottom: 2px solid rgba(77,208,225,0.3);"></div><div style="position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px; border-right: 2px solid rgba(77,208,225,0.3); border-bottom: 2px solid rgba(77,208,225,0.3);"></div>
  
  NOTE: シンプルな構成。タイトル大きく＋説明文
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Serif+JP:wght@400;500;700;900&display=swap');
</style>
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: linear-gradient(135deg, #E0F7FA 0%, #E0F2F1 100%);
  position: relative;
  overflow: hidden;
  font-family: 'Noto Serif JP', serif;
">
  <!-- 左端の装飾ライン -->
  <div style="position: absolute; top: 0; left: 0; width: 12px; height: 100%; background: linear-gradient(180deg, #4DD0E1 0%, #80DEEA 100%);"></div>

  <!-- 見出しバナー -->
  <div style="
    display: inline-block;
    background: linear-gradient(90deg, #4DD0E1 0%, #80DEEA 100%);
    padding: 10px 40px 10px 24px;
    margin: 0;
  ">
    <span style="
      font-size: 36px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.15em;
    ">サンプル見出し</span>
  </div>

  <!-- バナー下の水平線 -->
  <div style="
    width: 100%;
    height: 1px;
    background: #4DD0E1;
    margin-top: 8px;
  "></div>

  <!-- コンテンツエリア -->
  <div style="
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 100px;
    min-height: 540px;
    text-align: center;
  ">
    <!-- コンテンツタイトル -->
    <h3 style="
      font-size: 48px;
      font-weight: 800;
      color: #37474F;
      margin: 0 0 40px 0;
      letter-spacing: 0.04em;
      line-height: 1.3;
    ">提供コンテンツ</h3>

    <!-- 説明文 -->
    <p style="
      font-size: 28px;
      font-weight: 500;
      color: #455A64;
      margin: 0;
      line-height: 1.8;
      text-align: center;
      max-width: 1000px;
    ">提供コンテンツの詳細な説明文がここに入ります。</p>
  </div>

  <!-- 右下の装飾ライン -->
  <div style="position: absolute; bottom: 30px; right: 30px; width: 100px; height: 100px; border-right: 2px solid rgba(77,208,225,0.3); border-bottom: 2px solid rgba(77,208,225,0.3);"></div><div style="position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px; border-right: 2px solid rgba(77,208,225,0.3); border-bottom: 2px solid rgba(77,208,225,0.3);"></div>
</div>
