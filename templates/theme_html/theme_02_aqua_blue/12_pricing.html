<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #FCFEFE 0%, #E7F6F6 100%);position:relative;overflow:hidden;">
  <!-- 左上の斜め線装飾（1本） -->
<div style="position:absolute;top:-50px;left:-50px;width:300px;height:300px;z-index:0;pointer-events:none;opacity:0.7;">
  <div style="position:absolute;top:150px;left:-100px;width:400px;height:2px;background:linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);transform:rotate(-45deg);"></div>
</div>
  <!-- 右下の斜め線装飾（2本） -->
<div style="position:absolute;bottom:-50px;right:-50px;width:300px;height:300px;z-index:0;pointer-events:none;opacity:0.7;">
  <div style="position:absolute;bottom:150px;right:-100px;width:400px;height:2px;background:linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);transform:rotate(-45deg);"></div>
  <div style="position:absolute;bottom:200px;right:-50px;width:400px;height:1px;background:linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);transform:rotate(-45deg);opacity:0.7;"></div>
</div>
</div>
  <!-- 左上バナー -->
  <div style="position:relative;z-index:1;margin-top:44px;margin-left:60px;display:inline-block;">
    <div style="background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);padding:12px 36px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">料金プラン</span>
    </div>
  </div>

  <!-- シャンパンゴールド横線（テーマ2ではアクアブルー系） -->
  <div style="position:relative;z-index:1;margin:0 60px;height:1.5px;background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F));margin-top:14px;"></div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;justify-content:center;align-items:center;gap:40px;margin-top:20px;">

    <!-- スタンダードプラン -->
    <div style="width:500px;background:rgba(255,255,255,0.8);border:1px solid rgba(135,206,250,0.3);display:flex;flex-direction:column;align-items:center;padding:40px 30px;">
      <h3 style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:#4682B4;letter-spacing:0.05em;">スタンダード</h3>
      <div style="width:60px;height:2px;background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);margin:20px 0;"></div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:30px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#C5A55A;">298,000</span>
        <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#C5A55A;">円(税込)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#4682B4;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">動画教材サイト（全6章）</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#4682B4;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">月1回のグループ講義</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#4682B4;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">チャットサポート（無制限）</span>
        </div>
      </div>
    </div>

    <!-- VIPプラン -->
    <div style="width:500px;background:linear-gradient(135deg,rgba(135,206,250,0.1),rgba(70,130,180,0.1));border:2px solid #4682B4;display:flex;flex-direction:column;align-items:center;padding:40px 30px;position:relative;">
      <div style="position:absolute;top:-16px;background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);padding:4px 24px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">おすすめ</span>
      </div>
      <h3 style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:#4682B4;letter-spacing:0.05em;">VIPプラン</h3>
      <div style="width:60px;height:2px;background: linear-gradient(90deg, #07AAC0, #0B7495, #0B185F);margin:20px 0;"></div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:30px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#C5A55A;">498,000</span>
        <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#C5A55A;">円(税込)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#4682B4;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">スタンダードプラン全内容</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#4682B4;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#4682B4;">月1回の個別コンサル（60分）</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#4682B4;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#4682B4;">専用の個別食事プラン作成</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
