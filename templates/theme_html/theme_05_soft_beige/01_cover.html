<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background: #FFFCF8;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;">
  <!-- 左上ブロブ：クリームイエロー -->
  <div style="position:absolute;top:-100px;left:-100px;width:420px;height:380px;background:radial-gradient(ellipse at center,rgba(245,230,195,0.65) 0%,rgba(245,230,195,0.30) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- 右上ブロブ：サーモンピンク -->
  <div style="position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(ellipse at center,rgba(242,196,172,0.60) 0%,rgba(242,196,172,0.28) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- 右下ブロブ：ピーチサーモン -->
  <div style="position:absolute;bottom:-100px;right:-100px;width:420px;height:400px;background:radial-gradient(ellipse at center,rgba(240,190,165,0.65) 0%,rgba(240,190,165,0.30) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- コンテンツ -->
  <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px;">
    <p style="font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;color:#A09888;letter-spacing:0.1em;">{{SUBTITLE}}</p>
    <h1 style="font-family:'Noto Serif JP',serif;font-size:80px;font-weight:700;background: linear-gradient(135deg,#B5936B,#DDAD93,#C27C67); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;line-height:1.2;letter-spacing:0.05em;">{{PRODUCT_NAME}}</h1>
    <div style="width:80px;height:2px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);margin:10px 0;"></div>
    <p style="font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:#4A4A4A;letter-spacing:0.05em;">{{TAGLINE}}</p>
  </div>
</div>
</body>
</html>
