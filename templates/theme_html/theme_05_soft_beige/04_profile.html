<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background: #FFFCF8;position:relative;overflow:hidden;font-family:'Noto Serif JP',serif;">
  <!-- 左上ブロブ（控えめ） -->
  <div style="position:absolute;top:-80px;left:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(245,230,195,0.45) 0%,rgba(245,230,195,0.20) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- 右下ブロブ（控えめ） -->
  <div style="position:absolute;bottom:-80px;right:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(240,190,165,0.45) 0%,rgba(240,190,165,0.20) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- 左上バナー -->
  <div style="position:relative;z-index:1;margin-top:44px;margin-left:60px;display:inline-block;">
    <div style="background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);padding:12px 36px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">講師プロフィール</span>
    </div>
  </div>
  <!-- 横線 -->
  <div style="position:relative;z-index:1;margin:0 60px;height:1.5px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);margin-top:14px;"></div>
  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;align-items:center;gap:60px;margin-top:20px;">
    <!-- 左側：画像プレースホルダー -->
    <div style="width:400px;height:400px;background:rgba(212,168,112,0.08);border:1px solid rgba(212,168,112,0.25);display:flex;justify-content:center;align-items:center;flex-shrink:0;">
      <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#A09888;">[画像配置スペース]</span>
    </div>
    <!-- 右側：テキスト情報 -->
    <div style="display:flex;flex-direction:column;gap:24px;flex-grow:1;">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <p style="font-family:'Noto Serif JP',serif;font-size:20px;font-weight:500;color:#A09888;letter-spacing:0.05em;">{{INSTRUCTOR_TITLE}}</p>
        <h2 style="font-family:'Noto Serif JP',serif;font-size:48px;font-weight:700;background: linear-gradient(135deg,#B5936B,#DDAD93,#C27C67); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;letter-spacing:0.1em;">{{INSTRUCTOR_NAME}}</h2>
      </div>
      <div style="width:120px;height:1px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);"></div>
      <div style="display:flex;flex-direction:column;gap:16px;margin-top:8px;">
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#B5936B;flex-shrink:0;line-height:1.5;">◆</span>
          <p style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.6;">{{PROFILE_1}}</p>
        </div>
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#B5936B;flex-shrink:0;line-height:1.5;">◆</span>
          <p style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.6;">{{PROFILE_2}}</p>
        </div>
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#B5936B;flex-shrink:0;line-height:1.5;">◆</span>
          <p style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.6;">{{PROFILE_3}}</p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
