<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background: #FFFCF8;position:relative;overflow:hidden;font-family:'Noto Serif JP',serif;">
  <!-- 左上ブロブ（控えめ） -->
  <div style="position:absolute;top:-80px;left:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(245,230,195,0.45) 0%,rgba(245,230,195,0.20) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- 右下ブロブ（控えめ） -->
  <div style="position:absolute;bottom:-80px;right:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(240,190,165,0.45) 0%,rgba(240,190,165,0.20) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- 左上バナー -->
  <div style="position:relative;z-index:1;margin-top:44px;margin-left:60px;display:inline-block;">
    <div style="background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);padding:12px 36px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">料金プラン</span>
    </div>
  </div>
  <!-- 横線 -->
  <div style="position:relative;z-index:1;margin:0 60px;height:1.5px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);margin-top:14px;"></div>
  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;justify-content:center;align-items:center;gap:40px;margin-top:20px;">
    <!-- スタンダードプラン -->
    <div style="width:500px;background:rgba(245,230,195,0.15);border:1px solid rgba(212,168,112,0.25);display:flex;flex-direction:column;align-items:center;padding:40px 30px;">
      <h3 style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;background: linear-gradient(135deg,#B5936B,#DDAD93,#C27C67); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;letter-spacing:0.05em;">{{PLAN1_NAME}}</h3>
      <div style="width:60px;height:2px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);margin:20px 0;"></div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:30px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#C5A55A;">{{PLAN1_PRICE}}</span>
        <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#C5A55A;">円(税込)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#B5936B;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">{{PLAN1_F1}}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#B5936B;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">{{PLAN1_F2}}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#B5936B;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">{{PLAN1_F3}}</span>
        </div>
      </div>
    </div>
    <!-- VIPプラン -->
    <div style="width:500px;background:rgba(240,190,165,0.15);border:2px solid rgba(192,136,120,0.40);display:flex;flex-direction:column;align-items:center;padding:40px 30px;position:relative;">
      <div style="position:absolute;top:-16px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);padding:4px 24px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">おすすめ</span>
      </div>
      <h3 style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;background: linear-gradient(135deg,#B5936B,#DDAD93,#C27C67); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;letter-spacing:0.05em;">{{PLAN2_NAME}}</h3>
      <div style="width:60px;height:2px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);margin:20px 0;"></div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:30px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#C5A55A;">{{PLAN2_PRICE}}</span>
        <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#C5A55A;">円(税込)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#B5936B;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">{{PLAN2_F1}}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#B5936B;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#C27C67;">{{PLAN2_F2}}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#B5936B;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#C27C67;">{{PLAN2_F3}}</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
