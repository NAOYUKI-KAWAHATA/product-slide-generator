<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background: #FFFCF8;position:relative;overflow:hidden;font-family:'Noto Serif JP',serif;">
  <!-- 左上ブロブ（控えめ） -->
  <div style="position:absolute;top:-80px;left:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(245,230,195,0.45) 0%,rgba(245,230,195,0.20) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- 右下ブロブ（控えめ） -->
  <div style="position:absolute;bottom:-80px;right:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(240,190,165,0.45) 0%,rgba(240,190,165,0.20) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- ワイドバナー（上部中央） -->
  <div style="background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);padding:16px 80px;text-align:center;margin-top:60px;">
    <span style="font-size:30px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">{{WIDE_BANNER_TITLE}}</span>
  </div>
  <!-- インパクト文エリア -->
  <div style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:40px 100px;min-height:480px;gap:60px;">
    <p style="font-size:34px;font-weight:700;color:#4A4A4A;margin:0;letter-spacing:0.02em;line-height:1.5;">{{LINE1}}</p>
    <p style="font-size:34px;font-weight:700;color:#4A4A4A;margin:0;letter-spacing:0.02em;line-height:1.5;">{{LINE2}}</p>
    <p style="font-size:34px;font-weight:700;color:#4A4A4A;margin:0;letter-spacing:0.02em;line-height:1.5;">{{LINE3}}</p>
  </div>
</div>
</body>
</html>
