<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background: #FFFCF8;position:relative;overflow:hidden;font-family:'Noto Serif JP',serif;">
  <!-- 左上ブロブ（控えめ） -->
  <div style="position:absolute;top:-80px;left:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(245,230,195,0.45) 0%,rgba(245,230,195,0.20) 50%,transparent 75%);z-index:-1;pointer-events:none;"></div>
  <!-- 右下ブロブ（控えめ） -->
  <div style="position:absolute;bottom:-80px;right:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(240,190,165,0.45) 0%,rgba(240,190,165,0.20) 50%,transparent 75%);z-index:-1;pointer-events:none;"></div>
  <!-- 見出しバナー -->
  <div style="display:inline-block;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);padding:10px 40px 10px 24px;margin:0;">
    <span style="font-size:36px;font-weight:700;color:#FFFFFF;letter-spacing:0.15em;">{{BANNER_TITLE}}</span>
  </div>
  <!-- バナー下の水平線 -->
  <div style="width:100%;height:1px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);margin-top:8px;"></div>
  <!-- 2カラムエリア -->
  <div style="display:flex;min-height:600px;margin-top:8px;">
    <!-- 左カラム -->
    <div style="width:35%;background:rgba(245,230,195,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;">
      <p style="font-size:36px;font-weight:700;color:#4A4A4A;letter-spacing:0.08em;text-align:center;line-height:1.4;">{{LEFT_TITLE}}</p>
    </div>
    <!-- 中央の区切り線 -->
    <div style="width:2px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);opacity:0.4;"></div>
    <!-- 右カラム -->
    <div style="flex:1;background:rgba(240,190,165,0.10);display:flex;flex-direction:column;justify-content:center;padding:40px 60px;gap:24px;">
      <div style="display:flex;align-items:baseline;gap:16px;">
        <span style="font-size:20px;font-weight:700;color:#B5936B;flex-shrink:0;">01</span>
        <span style="font-size:28px;font-weight:700;color:#4A4A4A;line-height:1.4;">{{CHAPTER1}}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:16px;">
        <span style="font-size:20px;font-weight:700;color:#B5936B;flex-shrink:0;">02</span>
        <span style="font-size:28px;font-weight:700;color:#4A4A4A;line-height:1.4;">{{CHAPTER2}}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:16px;">
        <span style="font-size:20px;font-weight:700;color:#B5936B;flex-shrink:0;">03</span>
        <span style="font-size:28px;font-weight:700;color:#4A4A4A;line-height:1.4;">{{CHAPTER3}}</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
