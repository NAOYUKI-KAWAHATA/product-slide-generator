<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background: #FFFCF8;position:relative;overflow:hidden;font-family:'Noto Serif JP',serif;">
  <!-- 左上ブロブ（控えめ） -->
  <div style="position:absolute;top:-80px;left:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(245,230,195,0.45) 0%,rgba(245,230,195,0.20) 50%,transparent 75%);z-index:-1;pointer-events:none;"></div>
  <!-- 右下ブロブ（控えめ） -->
  <div style="position:absolute;bottom:-80px;right:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(240,190,165,0.45) 0%,rgba(240,190,165,0.20) 50%,transparent 75%);z-index:-1;pointer-events:none;"></div>
  <!-- 左上バナー -->
  <div style="position:relative;z-index:1;margin-top:44px;margin-left:60px;display:inline-block;">
    <div style="background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);padding:12px 36px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">{{BANNER_TITLE}}</span>
    </div>
  </div>
  <!-- 横線 -->
  <div style="position:relative;z-index:1;margin:0 60px;height:1.5px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);margin-top:14px;"></div>
  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;display:flex;flex-direction:column;justify-content:center;gap:16px;margin-top:16px;margin-bottom:64px;">
    <!-- フェーズ1 -->
    <div style="display:flex;flex-direction:column;gap:10px;background:rgba(245,230,195,0.20);padding:14px 28px;border:1px solid rgba(212,168,112,0.20);">
      <div style="display:flex;align-items:center;gap:20px;">
        <div style="background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);padding:10px 22px;flex-shrink:0;">
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">フェーズ1</span>
        </div>
        <h3 style="font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;color:#B5936B;">{{PHASE1_TITLE}}</h3>
      </div>
      <p style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.5;margin-top:4px;">{{PHASE1_TEXT}}</p>
    </div>
    <!-- フェーズ2 -->
    <div style="display:flex;flex-direction:column;gap:10px;background:rgba(240,190,165,0.15);padding:14px 28px;border:1px solid rgba(192,136,120,0.20);">
      <div style="display:flex;align-items:center;gap:20px;">
        <div style="background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);padding:10px 22px;flex-shrink:0;">
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">フェーズ2</span>
        </div>
        <h3 style="font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;color:#C27C67;">{{PHASE2_TITLE}}</h3>
      </div>
      <p style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.5;margin-top:4px;">{{PHASE2_TEXT}}</p>
    </div>
  </div>
</div>
</body>
</html>
