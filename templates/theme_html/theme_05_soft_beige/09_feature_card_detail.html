<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background: #FFFCF8;position:relative;overflow:hidden;font-family:'Noto Serif JP',serif;">
  <!-- 左上ブロブ（控えめ） -->
  <div style="position:absolute;top:-80px;left:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(245,230,195,0.45) 0%,rgba(245,230,195,0.20) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- 右下ブロブ（控えめ） -->
  <div style="position:absolute;bottom:-80px;right:-80px;width:280px;height:260px;background:radial-gradient(ellipse at center,rgba(240,190,165,0.45) 0%,rgba(240,190,165,0.20) 50%,transparent 75%);z-index:0;pointer-events:none;"></div>
  <!-- タイトルエリア -->
  <div style="text-align:center;padding:48px 80px 0 80px;">
    <h3 style="font-size:48px;font-weight:700;background: linear-gradient(135deg,#B5936B,#DDAD93,#C27C67); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;margin:0 0 16px 0;letter-spacing:0.04em;">{{MAIN_TITLE}}</h3>
    <p style="font-size:24px;font-weight:400;color:#A09888;margin:0;line-height:1.6;">{{MAIN_SUBTITLE}}</p>
  </div>
  <!-- 3カラム特徴エリア -->
  <div style="display:flex;justify-content:center;gap:40px;padding:40px 80px 48px 80px;">
    <div style="flex:1;text-align:center;">
      <div style="width:100%;height:240px;background:rgba(245,230,195,0.20);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
        <span style="font-size:14px;color:rgba(160,152,136,0.5);">画像1</span>
      </div>
      <p style="font-size:22px;font-weight:700;color:#4A4A4A;margin:0;line-height:1.4;">{{FEATURE1}}</p>
    </div>
    <div style="flex:1;text-align:center;">
      <div style="width:100%;height:240px;background:rgba(240,190,165,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
        <span style="font-size:14px;color:rgba(160,152,136,0.5);">画像2</span>
      </div>
      <p style="font-size:22px;font-weight:700;color:#4A4A4A;margin:0;line-height:1.4;">{{FEATURE2}}</p>
    </div>
    <div style="flex:1;text-align:center;">
      <div style="width:100%;height:240px;background:rgba(242,196,172,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
        <span style="font-size:14px;color:rgba(160,152,136,0.5);">画像3</span>
      </div>
      <p style="font-size:22px;font-weight:700;color:#4A4A4A;margin:0;line-height:1.4;">{{FEATURE3}}</p>
    </div>
  </div>
</div>
</body>
</html>
