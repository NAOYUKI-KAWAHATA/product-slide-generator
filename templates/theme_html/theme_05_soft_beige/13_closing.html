<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background: #FFFCF8;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;font-family:'Noto Serif JP',serif;">
  <!-- 左上ブロブ：クリームイエロー -->
  <div style="position:absolute;top:-100px;left:-100px;width:420px;height:380px;background:radial-gradient(ellipse at center,rgba(245,230,195,0.65) 0%,rgba(245,230,195,0.30) 50%,transparent 75%);z-index:-1;pointer-events:none;"></div>
  <!-- 右上ブロブ：サーモンピンク -->
  <div style="position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(ellipse at center,rgba(242,196,172,0.60) 0%,rgba(242,196,172,0.28) 50%,transparent 75%);z-index:-1;pointer-events:none;"></div>
  <!-- 右下ブロブ：ピーチサーモン -->
  <div style="position:absolute;bottom:-100px;right:-100px;width:420px;height:400px;background:radial-gradient(ellipse at center,rgba(240,190,165,0.65) 0%,rgba(240,190,165,0.30) 50%,transparent 75%);z-index:-1;pointer-events:none;"></div>
  <!-- 中央コンテンツ -->
  <div style="text-align:center;z-index:1;padding:0 100px;">
    <p style="font-size:44px;font-weight:700;color:#4A4A4A;margin:0 0 24px 0;letter-spacing:0.04em;line-height:1.5;">{{MSG1}}</p>
    <p style="font-size:44px;font-weight:700;color:#4A4A4A;margin:0 0 40px 0;letter-spacing:0.04em;line-height:1.5;">{{MSG2}}</p>
    <div style="width:160px;height:1.5px;background:linear-gradient(90deg,#B5936B,#DDAD93,#C27C67);margin:0 auto 28px auto;"></div>
    <p style="font-size:28px;font-weight:400;color:#A09888;margin:0;letter-spacing:0.1em;">{{BRAND_NAME}}</p>
  </div>
</div>
</body>
</html>
