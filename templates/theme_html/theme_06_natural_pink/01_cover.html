<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:#FFFCFD;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;">
  <!-- ゴールド縦線（左端） -->
  <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,#C9A84C,#E8D08A,#C9A84C);z-index:1;pointer-events:none;"></div>
  <!-- ゴールド縦線（右端） -->
  <div style="position:absolute;top:0;right:0;width:3px;height:100%;background:linear-gradient(180deg,#C9A84C,#E8D08A,#C9A84C);z-index:1;pointer-events:none;"></div>
  <!-- 左上水彩ブロブ（大・ピンク） -->
  <div style="position:absolute;top:-80px;left:-80px;width:500px;height:450px;background:radial-gradient(ellipse at center,rgba(232,160,170,0.50) 0%,rgba(232,160,170,0.25) 45%,transparent 70%);z-index:0;pointer-events:none;"></div>
  <!-- 右下水彩ブロブ（大・ピンク） -->
  <div style="position:absolute;bottom:-80px;right:-80px;width:500px;height:420px;background:radial-gradient(ellipse at center,rgba(212,120,138,0.45) 0%,rgba(212,120,138,0.20) 45%,transparent 70%);z-index:0;pointer-events:none;"></div>
  <!-- ドット装飾（左上） -->
  <div style="position:absolute;top:80px;left:120px;z-index:1;pointer-events:none;">
    <div style="width:10px;height:10px;border-radius:50%;background:#6B8E6B;opacity:0.65;position:absolute;top:0;left:0;"></div>
    <div style="width:6px;height:6px;border-radius:50%;background:#8B9B8B;opacity:0.50;position:absolute;top:25px;left:40px;"></div>
    <div style="width:5px;height:5px;border-radius:50%;background:#9B8B8B;opacity:0.40;position:absolute;top:5px;left:70px;"></div>
    <div style="width:4px;height:4px;border-radius:50%;background:#6B8E6B;opacity:0.35;position:absolute;top:45px;left:20px;"></div>
    <div style="width:3px;height:3px;border-radius:50%;background:#8B9B8B;opacity:0.30;position:absolute;top:60px;left:55px;"></div>
  </div>
  <!-- コンテンツ -->
  <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px;">
    <p style="font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;background:linear-gradient(90deg,#F87C8F,#A97682);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.1em;">{{SUBTITLE}}</p>
    <h1 style="font-family:'Noto Serif JP',serif;font-size:80px;font-weight:700;background:linear-gradient(90deg,#F87C8F,#A97682);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;letter-spacing:0.05em;">{{PRODUCT_NAME}}</h1>
    <div style="width:640px;height:1.5px;background:linear-gradient(90deg,transparent,#F87C8F,transparent);margin:10px 0;"></div>
    <p style="font-family:'Noto Serif JP',serif;font-size:28px;font-weight:500;background:linear-gradient(90deg,#F87C8F,#A97682);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.05em;">{{TAGLINE}}</p>
  </div>
</div>
</body>
</html>
