<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #F5F5F5 0%, #E0E0E0 45%, #CCCCCC 93%, #4A4A4A 93%);position:relative;overflow:hidden;">

  <!-- 下部ダークグレー帯 -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:48px;background:linear-gradient(90deg,#4A4A4A,#2C2C2C);z-index:1;">
    <!-- ゴールド区切り線 -->
    <div style="position:absolute;bottom:12px;left:0;width:100%;height:1.5px;background:linear-gradient(90deg,#E2C792,#C5A55A,#A67C00);"></div>
  </div>

  <!-- 左上バナー -->
  <div style="position:relative;z-index:2;margin-top:44px;display:inline-block;">
    <div style="background:linear-gradient(90deg,#4A4A4A,#2C2C2C);padding:12px 48px 12px 60px;">
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">コンセプト</span>
    </div>
  </div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;flex-direction:column;justify-content:center;gap:60px;margin-top:20px;">
    
    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:40px;font-weight:700;color:#4A4A4A;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Sans JP',sans-serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">ひとりで戦う時代は終わり</p>
    </div>

    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:40px;font-weight:700;color:#4A4A4A;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Sans JP',sans-serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">SNS・トレンドに依存しないビジネスモデル</p>
    </div>

    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:40px;font-weight:700;color:#4A4A4A;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Sans JP',sans-serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">AIと競合を仲間に変えて売上を無限大に伸ばす共創コミュニティ</p>
    </div>

  </div>

</div>
</body>
</html>
