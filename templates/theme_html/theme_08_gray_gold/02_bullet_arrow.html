<!--
  TEMPLATE: 02_bullet_arrow (矢印付き箇条書き / コンセプト)
  USAGE: P2 — コンセプト文（3行）
  VARIABLES: サンプル見出し, サンプルテキスト1行目, サンプルテキスト2行目, サンプルテキスト3行目

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Serif+JP:wght@400;500;700;900&display=swap');
</style>
<div class="slide-container" style="

        border-left: 12px solid #424242;

        margin-right: 24px;

      <span style="
        font-size: 38px;
        font-weight: 800;
        color: #212121;
        letter-spacing: 0.04em;

    <!-- 行2 -->

      <div style="
        width: 120px;
        height: 2px;
        background: #424242;
        flex-shrink: 0;
      "></div>
      <div style="
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 12px solid #424242;
        flex-shrink: 0;
        margin-right: 24px;
      "></div>
      <span style="
        font-size: 38px;
        font-weight: 800;
        color: #212121;
        letter-spacing: 0.04em;
        line-height: 1.4;

      <div style="
        width: 160px;
        height: 2px;
        background: #424242;
        flex-shrink: 0;
        margin-top: 22px;

      <div style="
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 12px solid #424242;
        flex-shrink: 0;
        margin-right: 24px;
        margin-top: 16px;
      "></div>
      <span style="
        font-size: 38px;
        font-weight: 800;
        color: #212121;
        letter-spacing: 0.04em;
        line-height: 1.5;
      ">サンプルテキスト3行目</span>

  <!-- 右下の装飾ライン -->
