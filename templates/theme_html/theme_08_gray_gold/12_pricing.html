<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #F5F5F5 0%, #E0E0E0 45%, #CCCCCC 93%, #4A4A4A 93%);position:relative;overflow:hidden;">

  <!-- 下部ダークグレー帯 -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:48px;background:linear-gradient(90deg,#4A4A4A,#2C2C2C);z-index:1;">
    <!-- ゴールド区切り線 -->
    <div style="position:absolute;bottom:12px;left:0;width:100%;height:1.5px;background:linear-gradient(90deg, #F8E6C8, #DDBE7B, #FFE9AC, #FDF3D5, #B19549);"></div>
  </div>

  <!-- 左上バナー -->
  <div style="position:relative;z-index:2;margin-top:44px;display:inline-block;">
    <div style="background:linear-gradient(90deg,#4A4A4A,#2C2C2C);padding:12px 48px 12px 60px;">
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">料金プラン</span>
    </div>
  </div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;justify-content:center;align-items:center;gap:40px;margin-top:20px;margin-bottom:64px;">

    <!-- スタンダードプラン -->
    <div style="width:500px;background:rgba(255,255,255,0.9);border:1px solid rgba(74,74,74,0.2);display:flex;flex-direction:column;align-items:center;padding:40px 30px;">
      <h3 style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:#4A4A4A;letter-spacing:0.05em;">スタンダード</h3>
      <div style="width:60px;height:2px;background:linear-gradient(90deg, #F8E6C8, #DDBE7B, #FFE9AC, #FDF3D5, #B19549);margin:20px 0;"></div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:30px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#DDBE7B;">298,000</span>
        <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#DDBE7B;">円(税込)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:20px;color:#4A4A4A;">◆</span>
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:500;color:#4A4A4A;">動画教材サイト（全6章）</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:20px;color:#4A4A4A;">◆</span>
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:500;color:#4A4A4A;">月1回のグループ講義</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:20px;color:#4A4A4A;">◆</span>
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:500;color:#4A4A4A;">チャットサポート（無制限）</span>
        </div>
      </div>
    </div>

    <!-- VIPプラン -->
    <div style="width:500px;background:linear-gradient(135deg,rgba(74,74,74,0.05),rgba(197,165,90,0.05));border:2px solid #4A4A4A;display:flex;flex-direction:column;align-items:center;padding:40px 30px;position:relative;">
      <div style="position:absolute;top:-16px;background:linear-gradient(90deg,#4A4A4A,#2C2C2C);padding:4px 24px;">
        <span style="font-family:'Noto Sans JP',sans-serif;font-size:18px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">おすすめ</span>
      </div>
      <h3 style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:#4A4A4A;letter-spacing:0.05em;">VIPプラン</h3>
      <div style="width:60px;height:2px;background:linear-gradient(90deg, #F8E6C8, #DDBE7B, #FFE9AC, #FDF3D5, #B19549);margin:20px 0;"></div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:30px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#DDBE7B;">498,000</span>
        <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#DDBE7B;">円(税込)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:20px;color:#4A4A4A;">◆</span>
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:500;color:#4A4A4A;">スタンダードプラン全内容</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:20px;color:#4A4A4A;">◆</span>
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#4A4A4A;">月1回の個別コンサル（60分）</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:20px;color:#4A4A4A;">◆</span>
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#4A4A4A;">専用の個別食事プラン作成</span>
        </div>
      </div>
    </div>

  </div>

</div>
</body>
</html>
