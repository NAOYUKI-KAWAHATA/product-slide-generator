<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #F5F5F5 0%, #E0E0E0 45%, #CCCCCC 93%, #4A4A4A 93%);position:relative;overflow:hidden;">

  <!-- 下部ダークグレー帯 -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:48px;background:linear-gradient(135deg, #9D9B9B 0%, #4A4949 100%);z-index:1;">
    <!-- ゴールド区切り線 -->
    <div style="position:absolute;bottom:12px;left:0;width:100%;height:1.5px;background:linear-gradient(90deg, #F8E6C8, #DDBE7B, #FFE9AC, #FDF3D5, #B19549);"></div>
  </div>

  <!-- 左上バナー -->
  <div style="position:relative;z-index:2;margin-top:44px;display:inline-block;">
    <div style="background:linear-gradient(135deg, #9D9B9B 0%, #4A4949 100%);padding:12px 48px 12px 60px;">
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">カリキュラム詳細①</span>
    </div>
  </div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;display:flex;flex-direction:column;justify-content:center;gap:16px;margin-top:16px;padding-bottom:64px;">

    <!-- フェーズ1 -->
    <div style="display:flex;flex-direction:column;gap:10px;background:rgba(255,255,255,0.8);padding:14px 28px;border:1px solid rgba(74,74,74,0.2);">
      <div style="display:flex;align-items:center;gap:20px;">
        <div style="background:linear-gradient(135deg, #9D9B9B 0%, #4A4949 100%);padding:10px 22px;flex-shrink:0;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">フェーズ1</span>
        </div>
        <h3 style="font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;color:#4A4A4A;">第1章〜第2章「体を知り・食の原則を学ぶ基礎フェーズ」</h3>
      </div>
      <p style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.5;margin-top:4px;">女性ホルモンの仕組みと体質タイプを理解し、薬に頼らず食で治す美食メソッドの基本を習得します。まずは「なぜ不調が起きているのか」を知ることが変化の第一歩です。</p>
    </div>

    <!-- フェーズ2 -->
    <div style="display:flex;flex-direction:column;gap:10px;background:rgba(255,255,255,0.8);padding:14px 28px;border:1px solid rgba(74,74,74,0.2);">
      <div style="display:flex;align-items:center;gap:20px;">
        <div style="background:linear-gradient(135deg, #9D9B9B 0%, #4A4949 100%);padding:10px 22px;flex-shrink:0;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">フェーズ2</span>
        </div>
        <h3 style="font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;color:#4A4A4A;">第3章〜第4章「症状別に食事で改善する実践フェーズ」</h3>
      </div>
      <p style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:500;color:#4A4A4A;line-height:1.5;margin-top:4px;">生理痛・冷え性・更年期それぞれの症状に合わせた食事設計を実践。モデル食プランや美食ルーティンを身につけ、毎月の体調変化を実感できるようになります。</p>
    </div>

  </div>

</div>
</body>
</html>
