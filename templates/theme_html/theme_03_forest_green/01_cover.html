<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:radial-gradient(ellipse at 30% 30%, #F5FFFA 0%, #E8F5E9 40%, #E0F2F1 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;">

  <!-- 左上ダイヤモンドライン装飾 -->
  <div style="position:absolute;top:20px;left:20px;width:120px;height:120px;z-index:0;pointer-events:none;">
    <div style="position:absolute;top:0;left:0;width:80px;height:80px;border:1px solid rgba(143,188,143,0.5);transform:rotate(45deg);transform-origin:0 0;"></div>
    <div style="position:absolute;top:15px;left:15px;width:60px;height:60px;border:1px solid rgba(143,188,143,0.3);transform:rotate(45deg);transform-origin:0 0;"></div>
  </div>

  <!-- 右下ダイヤモンドライン装飾 -->
  <div style="position:absolute;bottom:20px;right:20px;width:120px;height:120px;z-index:0;pointer-events:none;">
    <div style="position:absolute;bottom:0;right:0;width:80px;height:80px;border:1px solid rgba(143,188,143,0.5);transform:rotate(45deg);transform-origin:100% 100%;"></div>
    <div style="position:absolute;bottom:15px;right:15px;width:60px;height:60px;border:1px solid rgba(143,188,143,0.3);transform:rotate(45deg);transform-origin:100% 100%;"></div>
  </div>

  <!-- コンテンツ -->
  <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px;">
    <p style="font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;color:#708090;letter-spacing:0.1em;">薬に頼らず、食で治す</p>
    <h1 style="font-family:'Noto Serif JP',serif;font-size:80px;font-weight:700;background:linear-gradient(135deg,#2E8B57,#8FBC8F,#A8D5BA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;letter-spacing:0.05em;">美食健康サロン</h1>
    <div style="width:80px;height:2px;background:linear-gradient(90deg,#2E8B57,#8FBC8F);margin:10px 0;"></div>
    <p style="font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:#4A4A4A;letter-spacing:0.05em;">女性特有の不調を根本改善する3ヶ月プログラム</p>
  </div>

</div>
</body>
</html>
