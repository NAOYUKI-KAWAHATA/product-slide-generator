<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #ECEEF4 0%, #DDE0E8 45%, #C8CDD8 93%, #1A2550 93%);position:relative;overflow:hidden;">

  <!-- 下部ネイビー帯 -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:48px;background:linear-gradient(90deg,#1A2550,#2A3B70);z-index:1;">
    <!-- ゴールド区切り線 -->
    <div style="position:absolute;bottom:12px;left:0;width:100%;height:1.5px;background:linear-gradient(90deg,#E2C792,#C5A55A,#A67C00);"></div>
  </div>

  <!-- 左上バナー -->
  <div style="position:relative;z-index:2;margin-top:44px;display:inline-block;">
    <div style="background:linear-gradient(90deg,#1A2550,#2A3B70);padding:12px 48px 12px 60px;">
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">講師プロフィール</span>
    </div>
  </div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;align-items:center;gap:60px;margin-top:20px;">
    
    <!-- 左側：画像プレースホルダー -->
    <div style="width:400px;height:400px;background:rgba(26,37,80,0.05);border:1px solid rgba(26,37,80,0.2);display:flex;justify-content:center;align-items:center;flex-shrink:0;">
      <span style="font-family:'Noto Sans JP',sans-serif;font-size:20px;color:#1A2550;">[画像配置スペース]</span>
    </div>

    <!-- 右側：テキスト情報 -->
    <div style="display:flex;flex-direction:column;gap:24px;flex-grow:1;">
      
      <!-- 肩書きと名前 -->
      <div style="display:flex;flex-direction:column;gap:8px;">
        <p style="font-family:'Noto Sans JP',sans-serif;font-size:20px;font-weight:500;color:#1A2550;letter-spacing:0.05em;">美食健康サロン 主宰</p>
        <h2 style="font-family:'Noto Serif JP',serif;font-size:48px;font-weight:700;color:#1A2550;letter-spacing:0.1em;">カワハタ</h2>
      </div>

      <div style="width:120px;height:2px;background:linear-gradient(90deg,#E2C792,#C5A55A);"></div>

      <!-- 箇条書き実績 -->
      <div style="display:flex;flex-direction:column;gap:16px;margin-top:8px;">
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#1A2550;flex-shrink:0;line-height:1.5;">◆</span>
          <p style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:500;color:#1A2550;line-height:1.6;">生理不順・更年期・冷え性など女性特有の不調を食生活で根本改善</p>
        </div>
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#1A2550;flex-shrink:0;line-height:1.5;">◆</span>
          <p style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:500;color:#1A2550;line-height:1.6;">薬・サプリに頼らない「食で治す」メソッドを確立</p>
        </div>
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:24px;font-weight:700;color:#1A2550;flex-shrink:0;line-height:1.5;">◆</span>
          <p style="font-family:'Noto Sans JP',sans-serif;font-size:26px;font-weight:500;color:#1A2550;line-height:1.6;">20〜60代の幅広い女性をサポート</p>
        </div>
      </div>

    </div>

  </div>

</div>
</body>
</html>
