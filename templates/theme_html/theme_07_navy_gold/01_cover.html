<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #818FA7 0%, #0C1856 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;">

  <!-- 装飾ライン -->
  <div style="position:absolute;top:40px;left:40px;right:40px;bottom:40px;border:1px solid rgba(197,165,90,0.3);pointer-events:none;"></div>
  <div style="position:absolute;top:50px;left:50px;right:50px;bottom:50px;border:1px solid rgba(197,165,90,0.1);pointer-events:none;"></div>

  <!-- コンテンツ -->
  <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px;">
    <p style="font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;color:#C5A55A;letter-spacing:0.1em;">薬に頼らず、食で治す</p>
    <h1 style="font-family:'Noto Serif JP',serif;font-size:80px;font-weight:700;background:linear-gradient(135deg,#E2C792,#C5A55A,#A67C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;letter-spacing:0.05em;">美食健康サロン</h1>
    <div style="width:80px;height:2px;background:linear-gradient(90deg,#E2C792,#C5A55A);margin:10px 0;"></div>
    <p style="font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:#FFFFFF;letter-spacing:0.05em;">女性特有の不調を根本改善する3ヶ月プログラム</p>
  </div>

</div>
</body>
</html>
