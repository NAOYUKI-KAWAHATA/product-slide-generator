<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #F5E3F3 0%, #FFFCFE 50%, #EBEAF8 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;">

  <!-- 左上の斜め線装飾 -->
<div style="position:absolute;top:-50px;left:-50px;width:300px;height:300px;z-index:0;pointer-events:none;">
  <div style="position:absolute;top:150px;left:-100px;width:400px;height:2px;background:linear-gradient(90deg, #6E6969, #FFFFFF, #818181, #F5F5F5, #797878);transform:rotate(-45deg);"></div>
  <div style="position:absolute;top:200px;left:-50px;width:400px;height:1px;background:linear-gradient(90deg, #6E6969, #FFFFFF, #818181, #F5F5F5, #797878);transform:rotate(-45deg);opacity:0.7;"></div>
</div>

  <!-- 右下の斜め線装飾 -->
<div style="position:absolute;bottom:-50px;right:-50px;width:300px;height:300px;z-index:0;pointer-events:none;">
  <div style="position:absolute;bottom:150px;right:-100px;width:400px;height:2px;background:linear-gradient(90deg, #6E6969, #FFFFFF, #818181, #F5F5F5, #797878);transform:rotate(-45deg);"></div>
  <div style="position:absolute;bottom:200px;right:-50px;width:400px;height:1px;background:linear-gradient(90deg, #6E6969, #FFFFFF, #818181, #F5F5F5, #797878);transform:rotate(-45deg);opacity:0.7;"></div>
</div>

  <!-- コンテンツ -->
  <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px;">
    <p style="font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;color:#8A8AAA;letter-spacing:0.1em;">薬に頼らず、食で治す</p>
    <h1 style="font-family:'Noto Serif JP',serif;font-size:80px;font-weight:700;background:linear-gradient(90deg, #6F9DC2, #9F82C8, #D68EC6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;letter-spacing:0.05em;">美食健康サロン</h1>
    <div style="width:80px;height:2px;background:linear-gradient(90deg, #6F9DC2, #9F82C8, #D68EC6);margin:10px 0;"></div>
    <p style="font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:#4A4A4A;letter-spacing:0.05em;">女性特有の不調を根本改善する3ヶ月プログラム</p>
  </div>

</div>
</body>
</html>
