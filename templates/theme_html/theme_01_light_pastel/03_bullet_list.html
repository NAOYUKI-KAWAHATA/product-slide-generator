<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg, #F5E3F3 0%, #FFFCFE 50%, #EBEAF8 100%);position:relative;overflow:hidden;">
  <!-- 左上の斜め線装飾 -->
<div style="position:absolute;top:-50px;left:-50px;width:300px;height:300px;z-index:-1;pointer-events:none;opacity:0.5;">
  <div style="position:absolute;top:150px;left:-100px;width:400px;height:2px;background:linear-gradient(90deg, #6E6969, #FFFFFF, #818181, #F5F5F5, #797878);transform:rotate(-45deg);"></div>
  <div style="position:absolute;top:200px;left:-50px;width:400px;height:1px;background:linear-gradient(90deg, #6E6969, #FFFFFF, #818181, #F5F5F5, #797878);transform:rotate(-45deg);opacity:0.7;"></div>
</div>
  <!-- 右下の斜め線装飾 -->
<div style="position:absolute;bottom:-50px;right:-50px;width:300px;height:300px;z-index:-1;pointer-events:none;opacity:0.5;">
  <div style="position:absolute;bottom:150px;right:-100px;width:400px;height:2px;background:linear-gradient(90deg, #6E6969, #FFFFFF, #818181, #F5F5F5, #797878);transform:rotate(-45deg);"></div>
  <div style="position:absolute;bottom:200px;right:-50px;width:400px;height:1px;background:linear-gradient(90deg, #6E6969, #FFFFFF, #818181, #F5F5F5, #797878);transform:rotate(-45deg);opacity:0.7;"></div>
</div>

  <!-- 左上バナー -->
  <div style="position:relative;z-index:1;margin-top:44px;margin-left:60px;display:inline-block;">
    <div style="background:linear-gradient(90deg, #6F9DC2, #9F82C8, #D68EC6);padding:12px 36px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">コンセプト</span>
    </div>
  </div>

  <!-- シャンパンゴールド横線（テーマ1ではラベンダーピンク系） -->
  <div style="position:relative;z-index:1;margin:0 60px;height:1.5px;background:linear-gradient(90deg, #6F9DC2, #9F82C8, #D68EC6));margin-top:14px;"></div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;flex-direction:column;justify-content:center;gap:60px;margin-top:20px;">
    
    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:40px;font-weight:700;color:#C48A9F;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Serif JP',serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">ひとりで戦う時代は終わり</p>
    </div>

    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:40px;font-weight:700;color:#C48A9F;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Serif JP',serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">SNS・トレンドに依存しないビジネスモデル</p>
    </div>

    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:40px;font-weight:700;color:#C48A9F;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Serif JP',serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">AIと競合を仲間に変えて売上を無限大に伸ばす共創コミュニティ</p>
    </div>

  </div>

</div>
</body>
</html>
