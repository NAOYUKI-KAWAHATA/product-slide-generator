<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Serif+JP:wght@400;500;700;900&display=swap');
</style>
<div class="slide-container" style="
  width: 1280px;
  min-height: 720px;
  background: linear-gradient(135deg, #F5E3F3 0%, #FFFCFE 50%, #EBEAF8 100%);
  position: relative;
  overflow: hidden;
  font-family: 'Noto Serif JP', serif;
">
  <!-- 左端の装飾ライン -->
  <div style="position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; border-top: 1px solid #D3D3D3; border-left: 1px solid #D3D3D3;"></div><div style="position: absolute; bottom: 20px; left: 20px; width: 40px; height: 40px; border-bottom: 1px solid #D3D3D3; border-left: 1px solid #D3D3D3;"></div>

  <!-- 見出しバナー -->
  <div style="
    display: inline-block;
    background: linear-gradient(90deg, #6F9DC2, #9F82C8, #D68EC6);
    padding: 10px 40px 10px 24px;
    margin: 0;
  ">
    <span style="
      font-size: 36px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.15em;
    ">サンプル見出し</span>
  </div>

  <!-- バナー下の水平線 -->
  <div style="
    width: 100%;
    height: 1px;
    background: #F8BBD0;
    margin-top: 8px;
  "></div>

  <!-- コンテンツエリア -->
  <div style="
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 100px;
    min-height: 540px;
    text-align: center;
  ">
    <!-- コンテンツタイトル -->
    <h3 style="
      font-size: 48px;
      font-weight: 800;
      color: #4A4A4A;
      margin: 0 0 40px 0;
      letter-spacing: 0.04em;
      line-height: 1.3;
    ">提供コンテンツ</h3>

    <!-- 説明文 -->
    <p style="
      font-size: 28px;
      font-weight: 500;
      color: #5A5A5A;
      margin: 0;
      line-height: 1.8;
      text-align: center;
      max-width: 1000px;
    ">提供コンテンツの詳細な説明文がここに入ります。</p>
  </div>

  <!-- 右下の装飾ライン -->
  <div style="position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-top: 1px solid #D3D3D3; border-right: 1px solid #D3D3D3;"></div><div style="position: absolute; bottom: 20px; right: 20px; width: 40px; height: 40px; border-bottom: 1px solid #D3D3D3; border-right: 1px solid #D3D3D3;"></div>
