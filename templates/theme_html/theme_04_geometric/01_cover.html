<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:linear-gradient(135deg,#FFFFFF 0%,#F0F0FA 50%,#E8E8F5 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;">

  <!-- 背景幾何学模様（bg_geometric.png使用・露出とコントラストを上げて全体に表示） -->
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;background-image:url('{{SKILL_DIR}}/templates/theme_html/theme_04_geometric/bg_geometric.png');background-size:cover;background-position:center;filter:brightness(1.4) contrast(1.1);opacity:0.7;pointer-events:none;"></div>

  <!-- 下部の波形装飾 Layer1（背面・薄め） -->
  <div style="position:absolute;bottom:-120px;left:-5%;width:110%;height:200px;z-index:1;background:linear-gradient(90deg,#9FAFFF,#4C68E2,#792D94,#C24CA8);border-top-left-radius:50% 120px;border-top-right-radius:50% 120px;opacity:0.45;pointer-events:none;"></div>
  <!-- 下部の波形装飾 Layer2（前面・濃いめ） -->
  <div style="position:absolute;bottom:-150px;left:-10%;width:120%;height:200px;z-index:2;background:linear-gradient(90deg,#9FAFFF,#4C68E2,#792D94,#C24CA8);border-top-left-radius:50% 100px;border-top-right-radius:50% 100px;opacity:0.75;pointer-events:none;"></div>


  <!-- コンテンツ（z-index:3で波形の上に表示） -->
  <div style="position:relative;z-index:3;text-align:center;display:flex;flex-direction:column;align-items:center;gap:28px;padding-bottom:80px;">
    <p style="font-family:'Noto Serif JP',serif;font-size:28px;font-weight:500;color:#6C6C8A;letter-spacing:0.12em;">{{CATCHCOPY}}</p>
    <h1 style="font-family:'Noto Serif JP',serif;font-size:88px;font-weight:900;background:linear-gradient(90deg,#4A7AD9,#7A4ABF,#C04A8A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;letter-spacing:0.05em;padding:10px 0;">{{TITLE}}</h1>
    <div style="width:100px;height:2px;background:linear-gradient(90deg,#4A7AD9,#7A4ABF,#C04A8A);margin:8px 0;"></div>
    <p style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;color:#4A4A6A;letter-spacing:0.06em;">{{SUBTITLE}}</p>
  </div>

</div>
</body>
</html>
