<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:radial-gradient(ellipse at 30% 30%, #F8F9FA 0%, #E9ECEF 40%, #DEE2E6 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;">

  <!-- 提供された幾何学模様の背景画像（露出とコントラストを上げて白っぽく） -->
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;background-image:url('/home/ubuntu/test_theme4_v2/bg_geometric.png');background-size:cover;background-position:center;filter:brightness(1.4) contrast(1.1);opacity:0.7;pointer-events:none;"></div>

  <!-- 下部のなだらかでクリーンな曲線のフッター帯（4色グラデーション） -->
  <div style="position:absolute;bottom:-150px;left:-10%;width:120%;height:200px;z-index:1;background:linear-gradient(90deg, #9FAFFF, #4C68E2, #792D94, #C24CA8);border-top-left-radius:50% 100px;border-top-right-radius:50% 100px;opacity:0.8;"></div>
  <div style="position:absolute;bottom:-180px;left:-5%;width:110%;height:220px;z-index:1;background:linear-gradient(90deg, #9FAFFF, #4C68E2, #792D94, #C24CA8);border-top-left-radius:50% 120px;border-top-right-radius:50% 120px;opacity:0.5;"></div>


  <!-- 左上ダイヤモンドライン装飾 -->
  <div style="position:absolute;top:20px;left:20px;width:120px;height:120px;z-index:-1;pointer-events:none;">
    <div style="position:absolute;top:0;left:0;width:80px;height:80px;border:1px solid rgba(173,181,189,0.5);transform:rotate(45deg);transform-origin:0 0;"></div>
    <div style="position:absolute;top:15px;left:15px;width:60px;height:60px;border:1px solid rgba(173,181,189,0.3);transform:rotate(45deg);transform-origin:0 0;"></div>
  </div>

  <!-- 右下ダイヤモンドライン装飾 -->
  <div style="position:absolute;bottom:20px;right:20px;width:120px;height:120px;z-index:-1;pointer-events:none;">
    <div style="position:absolute;bottom:0;right:0;width:80px;height:80px;border:1px solid rgba(173,181,189,0.5);transform:rotate(45deg);transform-origin:100% 100%;"></div>
    <div style="position:absolute;bottom:15px;right:15px;width:60px;height:60px;border:1px solid rgba(173,181,189,0.3);transform:rotate(45deg);transform-origin:100% 100%;"></div>
  </div>

  <!-- コンテンツ -->
  <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px;">
    <p style="font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;color:#6C757D;letter-spacing:0.1em;">薬に頼らず、食で治す</p>
    <h1 style="font-family:'Noto Serif JP',serif;font-size:80px;font-weight:700;background-color:#FFFFFF;-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;letter-spacing:0.05em;">美食健康サロン</h1>
    <div style="width:80px;height:2px;background-color:#FFFFFF;margin:10px 0;"></div>
    <p style="font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:#4A4A4A;letter-spacing:0.05em;">女性特有の不調を根本改善する3ヶ月プログラム</p>
  </div>

</div>
</body>
</html>
