<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:radial-gradient(ellipse at 30% 30%, #F8F9FA 0%, #E9ECEF 40%, #DEE2E6 100%);position:relative;overflow:hidden;">

  <!-- 提供された幾何学模様の背景画像（露出とコントラストを上げて白っぽく） -->
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;background-image:url('{{SKILL_DIR}}/templates/theme_html/theme_04_geometric/bg_geometric.png');background-size:cover;background-position:center;filter:brightness(1.4) contrast(1.1);opacity:0.7;pointer-events:none;"></div>

  <!-- 下部のなだらかでクリーンな曲線のフッター帯（4色グラデーション） -->
  <div style="position:absolute;bottom:-150px;left:-10%;width:120%;height:200px;z-index:1;background:linear-gradient(90deg, #9FAFFF, #4C68E2, #792D94, #C24CA8);border-top-left-radius:50% 100px;border-top-right-radius:50% 100px;opacity:0.8;"></div>
  <div style="position:absolute;bottom:-180px;left:-5%;width:110%;height:220px;z-index:1;background:linear-gradient(90deg, #9FAFFF, #4C68E2, #792D94, #C24CA8);border-top-left-radius:50% 120px;border-top-right-radius:50% 120px;opacity:0.5;"></div>


  <!-- 左上ダイヤモンドライン（控えめ） -->
  <div style="position:absolute;top:10px;left:10px;width:80px;height:80px;z-index:-1;pointer-events:none;">
    <div style="position:absolute;top:0;left:0;width:55px;height:55px;border:1px solid rgba(173,181,189,0.4);transform:rotate(45deg);transform-origin:0 0;"></div>
  </div>

  <!-- 左上バナー -->
  <div style="position:relative;z-index:1;margin-top:44px;margin-left:60px;display:inline-block;">
    <div style="background-color:#FFFFFF;padding:12px 36px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">コンセプト</span>
    </div>
  </div>

  <!-- シャンパンゴールド横線（テーマ4ではクールグレー系） -->
  <div style="position:relative;z-index:1;margin:0 60px;height:1.5px;background:linear-gradient(90deg,#495057,#ADB5BD,rgba(173,181,189,0.4));margin-top:14px;"></div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;flex-direction:column;justify-content:center;gap:60px;margin-top:20px;">
    
    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:40px;font-weight:700;color:#495057;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Serif JP',serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">ひとりで戦う時代は終わり</p>
    </div>

    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:40px;font-weight:700;color:#495057;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Serif JP',serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">SNS・トレンドに依存しないビジネスモデル</p>
    </div>

    <div style="display:flex;align-items:flex-start;gap:24px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:40px;font-weight:700;color:#495057;flex-shrink:0;line-height:1.2;">◆</span>
      <p style="font-family:'Noto Serif JP',serif;font-size:38px;font-weight:500;color:#4A4A4A;line-height:1.5;">AIと競合を仲間に変えて売上を無限大に伸ばす共創コミュニティ</p>
    </div>

  </div>

</div>
</body>
</html>
