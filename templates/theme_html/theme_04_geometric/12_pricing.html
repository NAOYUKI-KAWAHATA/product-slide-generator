<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="slide-container" style="width:1280px;min-height:720px;background:radial-gradient(ellipse at 30% 30%, #F8F9FA 0%, #E9ECEF 40%, #DEE2E6 100%);position:relative;overflow:hidden;">

  <!-- 提供された幾何学模様の背景画像（露出とコントラストを上げて白っぽく） -->
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;background-image:url('{{SKILL_DIR}}/templates/theme_html/theme_04_geometric/bg_geometric.png');background-size:cover;background-position:center;filter:brightness(1.4) contrast(1.1);opacity:0.7;pointer-events:none;"></div>

  <!-- 下部のなだらかでクリーンな曲線のフッター帯（4色グラデーション） -->
  <div style="position:absolute;bottom:-150px;left:-10%;width:120%;height:200px;z-index:1;background:linear-gradient(90deg, #9FAFFF, #4C68E2, #792D94, #C24CA8);border-top-left-radius:50% 100px;border-top-right-radius:50% 100px;opacity:0.8;"></div>
  <div style="position:absolute;bottom:-180px;left:-5%;width:110%;height:220px;z-index:1;background:linear-gradient(90deg, #9FAFFF, #4C68E2, #792D94, #C24CA8);border-top-left-radius:50% 120px;border-top-right-radius:50% 120px;opacity:0.5;"></div>


  <!-- 左上ダイヤモンドライン（控えめ） -->
  <div style="position:absolute;top:10px;left:10px;width:80px;height:80px;z-index:-1;pointer-events:none;">
    <div style="position:absolute;top:0;left:0;width:55px;height:55px;border:1px solid rgba(173,181,189,0.4);transform:rotate(45deg);transform-origin:0 0;"></div>
  </div>

  <!-- 左上バナー -->
  <div style="position:relative;z-index:1;margin-top:44px;margin-left:60px;display:inline-block;">
    <div style="background-color:#FFFFFF;padding:12px 36px;">
      <span style="font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:0.08em;">料金プラン</span>
    </div>
  </div>

  <!-- シャンパンゴールド横線（テーマ4ではクールグレー系） -->
  <div style="position:relative;z-index:1;margin:0 60px;height:1.5px;background:linear-gradient(90deg,#495057,#ADB5BD,rgba(173,181,189,0.4));margin-top:14px;"></div>

  <!-- コンテンツエリア -->
  <div style="position:relative;z-index:2;padding:0 60px;min-height:480px;display:flex;justify-content:center;align-items:center;gap:40px;margin-top:20px;">

    <!-- スタンダードプラン -->
    <div style="width:500px;background:rgba(255,255,255,0.8);border:1px solid rgba(173,181,189,0.3);display:flex;flex-direction:column;align-items:center;padding:40px 30px;">
      <h3 style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:#495057;letter-spacing:0.05em;">スタンダード</h3>
      <div style="width:60px;height:2px;background-color:#FFFFFF;margin:20px 0;"></div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:30px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#C5A55A;">298,000</span>
        <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#C5A55A;">円(税込)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#495057;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">動画教材サイト（全6章）</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#495057;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">月1回のグループ講義</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#495057;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">チャットサポート（無制限）</span>
        </div>
      </div>
    </div>

    <!-- VIPプラン -->
    <div style="width:500px;background:linear-gradient(135deg,rgba(173,181,189,0.1),rgba(73,80,87,0.1));border:2px solid #495057;display:flex;flex-direction:column;align-items:center;padding:40px 30px;position:relative;">
      <div style="position:absolute;top:-16px;background-color:#FFFFFF;padding:4px 24px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:#FFFFFF;letter-spacing:0.1em;">おすすめ</span>
      </div>
      <h3 style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:#495057;letter-spacing:0.05em;">VIPプラン</h3>
      <div style="width:60px;height:2px;background-color:#FFFFFF;margin:20px 0;"></div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:30px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:60px;font-weight:700;color:#C5A55A;">498,000</span>
        <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#C5A55A;">円(税込)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#495057;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:500;color:#4A4A4A;">スタンダードプラン全内容</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#495057;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#495057;">月1回の個別コンサル（60分）</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#495057;">◆</span>
          <span style="font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#495057;">専用の個別食事プラン作成</span>
        </div>
      </div>
    </div>

  </div>

</div>
</body>
</html>
